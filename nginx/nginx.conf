events {
    worker_connections 1024;
}

http {
    # Сжимаем JSON-ответы (~60% меньше трафика)
    gzip            on;
    gzip_min_length 1000;
    gzip_types      application/json text/plain;

    upstream go_checker {
        server go-checker:8080;
    }

    server {
        listen 80;

        # Таймауты на upstream
        proxy_connect_timeout  5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Передаём реальный IP клиента в сервис
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # /metrics закрыт снаружи — Prometheus скрейпит напрямую внутри Docker-сети
        location /metrics {
            deny all;
        }

        location / {
            proxy_pass http://go_checker;
        }
    }
}
