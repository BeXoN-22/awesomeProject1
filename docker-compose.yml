services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mimile
      POSTGRES_USER: mimile
      POSTGRES_PASSWORD: mimile_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimile"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  go-checker:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://mimile:mimile_secret@postgres:5432/mimile?sslmode=disable
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - go-checker

  # fastapi:
